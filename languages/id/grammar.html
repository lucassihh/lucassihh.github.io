<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Learn Languages for Free!" />

    <title>YooLingo - Aprendendo [learning_language]</title>

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="../../styles/tailwind.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" /> 
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="//unpkg.com/alpinejs" defer></script>
    
    <!-- Anti Fliker -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemPrefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;

        if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>
  <body
    class="bg-background font-plus-jakarta-sans"
    data-grammar-from="portuguese"
    data-grammar-to="indonesian"
  >
    
    
    <!-- Header -->
    <header
      class="fixed top-0 sticky flex justify-between items-center bg-background/90 backdrop-blur-sm p-6 border-b border-border z-20"
    >
      <nav class="flex items-center gap-4">
        <!--Back -->
        <a
          href="./index.html"
          class="hidden md:block relative overflow-hidden flex items-center justify-center ripple-btn p-2 rounded-full text-primary hover:bg-card hover:scale-105 transition-all duration-300"
        >
          <i data-lucide="arrow-left" class="size-6"></i>
        </a>
        <!-- Theme Toggle -->
        <button
          id="theme-toggle-desktop"
          class="relative overflow-hidden flex items-center justify-center ripple-btn p-2 rounded-full text-primary hover:bg-card hover:scale-105 transition-all duration-300"
        >
          <i data-lucide="moon-star" class="w-5 h-5 dark:hidden"></i>
          <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
      </nav>
    </header>

    <!-- Main -->
    <main class="py-4 space-y-8">
      <section class="px-4">
        <div class="flex items-center gap-2">
          <img
            class="size-8 rounded-full border-2 border-white object-cover"
            src="../../assets/flag/id.svg"
          />
          <h1
            class="text-primary text-4xl font-semibold leading-tight tracking-tight"
          >
            Bahasa Indonesia
          </h1>
        </div>
        <p
          class="text-muted text-3xl font-semibold leading-tight tracking-tight"
        >
          Gramática
        </p>
      </section>

      <!-- Table  -->
      <section x-data="{ selectedTab: 'adjectives' }" class="w-full">
        <div
          @keydown.right.prevent="$focus.wrap().next()"
          @keydown.left.prevent="$focus.wrap().previous()"
          class="flex flex-wrap gap-3 pb-2 px-4"
          role="tablist"
          aria-label="tab options"
        >
          <button
            @click="selectedTab = 'adjectives'"
            :aria-selected="selectedTab === 'adjectives'"
            :tabindex="selectedTab === 'adjectives' ? '0' : '-1'"
            :class="selectedTab === 'adjectives' ? 'tab-btn tab-active px-6 py-2 rounded-full text-sm text-primary bg-card' : 'tab-btn px-6 py-2 rounded-full text-sm text-primary bg-card'"
            class="flex h-min items-center gap-2 px-4 py-2 text-sm"
            type="button"
            role="tab"
            aria-controls="tabpanelAdjectives"
          >
            Adjectives
          </button>

          <button
            @click="selectedTab = 'adverbs'"
            :aria-selected="selectedTab === 'adverbs'"
            :tabindex="selectedTab === 'adverbs' ? '0' : '-1'"
            :class="selectedTab === 'adverbs' ? 'tab-btn tab-active px-6 py-2 rounded-full text-sm text-primary bg-card' : 'tab-btn px-6 py-2 rounded-full text-sm text-primary bg-card'"
            class="flex h-min items-center gap-2 px-4 py-2 text-sm"
            type="button"
            role="tab"
            aria-controls="tabpanelAdverbs"
          >
            Adverbs
          </button>

          <button
            @click="selectedTab = 'nouns'"
            :aria-selected="selectedTab === 'nouns'"
            :tabindex="selectedTab === 'nouns' ? '0' : '-1'"
            :class="selectedTab === 'nouns' ? 'tab-btn tab-active px-6 py-2 rounded-full text-sm text-primary bg-card' : 'tab-btn px-6 py-2 rounded-full text-sm text-primary bg-card'"
            class="flex h-min items-center gap-2 px-4 py-2 text-sm"
            type="button"
            role="tab"
            aria-controls="tabpanelNouns"
          >
            Nouns
          </button>

          <button
            @click="selectedTab = 'pronouns'"
            :aria-selected="selectedTab === 'pronouns'"
            :tabindex="selectedTab === 'pronouns' ? '0' : '-1'"
            :class="selectedTab === 'pronouns' ? 'tab-btn tab-active px-6 py-2 rounded-full text-sm text-primary bg-card' : 'tab-btn px-6 py-2 rounded-full text-sm text-primary bg-card'"
            class="flex h-min items-center gap-2 px-4 py-2 text-sm"
            type="button"
            role="tab"
            aria-controls="tabpanelPronouns"
          >
            Pronouns
          </button>

          <button
            @click="selectedTab = 'verbs'"
            :aria-selected="selectedTab === 'verbs'"
            :tabindex="selectedTab === 'verbs' ? '0' : '-1'"
            :class="selectedTab === 'verbs' ? 'tab-btn tab-active px-6 py-2 rounded-full text-sm text-primary bg-card' : 'tab-btn px-6 py-2 rounded-full text-sm text-primary bg-card'"
            class="flex h-min items-center gap-2 px-4 py-2 text-sm"
            type="button"
            role="tab"
            aria-controls="tabpanelVerbs"
          >
            Verbs
          </button>
        </div>

        <div>
          <div
            x-show="selectedTab === 'adjectives'"
            id="tabpanelAdjectives"
            role="tabpanel"
            aria-labelledby="Adjectives"
          >
            <div id="adjectives"></div>
          </div>

          <div
            x-show="selectedTab === 'adverbs'"
            id="tabpanelAdverbs"
            role="tabpanel"
            aria-labelledby="Adverbs"
          >
            <div id="adverbs">Adverbs content goes here.</div>
          </div>

          <div
            x-show="selectedTab === 'nouns'"
            id="tabpanelNouns"
            role="tabpanel"
            aria-labelledby="Nouns"
          >
            <div id="nouns">Nouns content goes here.</div>
          </div>

          <div
            x-show="selectedTab === 'pronouns'"
            id="tabpanelPronouns"
            role="tabpanel"
            aria-labelledby="Pronouns"
          >
            <div id="pronouns">Pronouns content goes here.</div>
          </div>

          <div
            x-show="selectedTab === 'verbs'"
            id="tabpanelVerbs"
            role="tabpanel"
            aria-labelledby="Verbs"
          >
            <div id="verbs">Verbs content goes here.</div>
          </div>
        </div>
      </section>

      <!-- Alphabet -->
      <section>
        <!-- Header Text -->
        <div
          class="flex items-center justify-center mx-4 p-4 border border-border rounded-xl"
        >
          <div class="text-yellow-500 p-2">
            <i data-lucide="hand" class="size-6"></i>
          </div>
          <p class="text-primary text-md">
            Click on a letter of the alphabet to hear the
            <b class="underline">pronunciation</b> and examples of words.
          </p>
        </div>

        <!-- Alphabet Grid -->
        <div class="mt-4 py-4 bg-card pb-20">
          <div
            class="grid grid-cols-4 md:grid-cols-12 gap-3"
            id="alphabetGrid"
          ></div>

          <div class="flex items-start justify-between">
            <div class="flex-1 space-y-3">
              <div class="flex items-center gap-4">
                <div>
                  <span
                    id="selectedLetterDisplay"
                    class="text-primary font-bold text-xl"
                  ></span>
                </div>
                <div>
                  <p id="selectedPronunciation"></p>
                </div>
              </div>
              <div
                id="examplesContainer"
                class="flex flex-col gap-2 mt-4"
              ></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Float Menu -->
      <nav
        class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[80vw] max-w-md bg-white rounded-full p-2 flex justify-between items-center shadow-2xl z-20 md:hidden"
      >
        <!-- Home -->
        <a
          href="../../index.html"
          class="relative overflow-hidden ripple-btn size-12 flex items-center justify-center bg-black text-white rounded-full"
        >
          <i data-lucide="house" class="size-6"></i>
        </a>

        <!-- Back -->
        <a
          href="./index.html"
          class="flex items-center justify-center text-black/70 hover:text-black hover:scale-105 transition-all duration-300"
        >
          <i data-lucide="arrow-left" class="size-6"></i>
        </a>

        <!-- Fullscreen -->
        <button
          id="fullscreen-button"
          class="size-12 flex items-center justify-center text-black/70 hover:text-black hover:scale-105 transition-all duration-300"
        >
          <i data-lucide="maximize" class="size-6"></i>
        </button>
      </nav>
    </main>

    <!-- Alphabet Modal -->
    <div
      id="letterModal"
      class="modal hidden fixed inset-0 z-40 flex items-center justify-center"
      aria-hidden="true"
    >
      <div
        class="modal-overlay absolute inset-0 bg-background transition-all duration-300"
      ></div>

      <div
        class="modal-dialog w-full h-full max-w-4xl relative flex flex-col transition-all duration-300 p-10"
        role="dialog"
        aria-modal="true"
        tabindex="-1"
      >
        <button
          data-modal-close
          class="absolute top-2 right-2 flex items-center justify-center p-2 rounded-full text-primary hover:scale-105 transition-all duration-300"
          aria-label="Close"
        >
          <i data-lucide="x" class="size-6"></i>
        </button>

        <div id="modalLetterContent" class="space-y-4"></div>
      </div>
    </div>

    <!-- JS -->
    <script src="../../scripts/globalAudio.js"></script>
    <script src="../../scripts/main.js"></script>
    <script type="module" src="../../scripts/modal.js"></script>
    <script type="module" src="../../scripts/a/a.js"></script>
  </body>
</html>
