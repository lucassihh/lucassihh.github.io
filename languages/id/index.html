<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Learn Languages for Free!" />

    <title>YooLingo - Tópicos [learning_language]</title>

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="../../styles/tailwind.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" /> 
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Anti Fliker -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemPrefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;

        if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>
  <body
    class="bg-background font-plus-jakarta-sans"
    data-topic-slug="meeting_someone"
    data-from-lang="english"
    data-to-lang="indonesian"
    data-image-quiz="false"
    data-num-questions="0"
  >
  
    <!-- Header -->
    <header
      class="fixed top-0 sticky flex justify-between items-center bg-background/90 backdrop-blur-sm p-6 z-20"
    >
      <nav class="flex items-center gap-4">
        <!--Back -->
        <a
          href="../choose.html"
          class="relative overflow-hidden flex items-center justify-center ripple-btn p-2 rounded-full text-primary hover:bg-card hover:scale-105 transition-all duration-300"
        >
          <i data-lucide="arrow-left" class="size-6"></i>
        </a>
        <!-- Theme Toggle -->
        <button
          id="theme-toggle-desktop"
          class="relative overflow-hidden flex items-center justify-center ripple-btn p-2 rounded-full text-primary hover:bg-card hover:scale-105 transition-all duration-300"
        >
          <i data-lucide="moon-star" class="w-5 h-5 dark:hidden"></i>
          <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
      </nav>
    </header>

    
     <!-- Main -->
    <main class="px-6 space-y-8">
      <div>
        <h1
          class="text-4xl font-semibold leading-tight tracking-tight text-primary"
        >
          Vamos explorar<br />
          <span class="text-muted">Todos os Tópicos</span>
        </h1>
      </div>

      <!-- Category -->
      <section class="flex flex-wrap gap-3 pb-2">
        <!-- Buttons -->
        <button
          onclick="activateTab(this)"
          class="tab-btn tab-active px-6 py-2 rounded-full text-sm text-primary bg-card"
        >
          All
        </button>

        <!-- Buttons -->
        <button
          onclick="activateTab(this)"
          class="tab-btn px-6 py-2 rounded-full text-sm text-primary bg-card"
        >
          Popular
        </button>
      </section>

      <!-- Topics Grid -->
      <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
        
           <!-- Grammar -->
            <a href="./grammar.html"
              class="bg-[#FFFBF2] rounded-3xl p-5 flex justify-between items-center border border-slate-50 overflow-hidden relative cursor-pointer hover:shadow-md transition-shadow"
            >
              <div class="z-10">
                <span
                  class="bg-[#FFECC2] text-[#B88600] text-[10px] font-bold px-2.5 py-1 rounded-lg"
                  >A1</span
                >
                <p class="text-slate-400 text-xs mt-3">Indonesian</p>
                <h4 class="text-xl font-bold text-slate-800 mt-0.5">
                  Grammar
                </h4>
                <p class="text-slate-400 text-[10px] mt-1">Processing...</p>
              </div>
              <div class="relative w-32 h-24">
                 <img src="../../assets/img/pixabay/learning2.svg" class="size-42 -mt-10 ml-10 object-cover">
              </div>
            </a>

      </section>
    </main>

    <!-- JS -->
    <script src="../../scripts/main.js"></script>
  </body>
</html>
