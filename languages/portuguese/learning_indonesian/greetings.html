      <!-- Set APIs  -->
      <script>
         document.addEventListener('DOMContentLoaded', async () => {
           try {
              const response = await fetch('../../../db/greetings.json');
             // Using file JSON const response = await fetch('');
             const data = await response.json();
           // Set Languages
             const fromLang = 'indonesian';
             const toLang = 'portuguese';
          
           // Carousel
             renderCarousel({
               vocabulario: data,
               fromLang: fromLang,
               toLang: toLang,
             });
             
          // Vocabulary
             renderVocabulario({
               vocabulario: data,
               containerId: 'vocab',
               muteBtnId: 'mute-vocab',
               fromLang: fromLang,
               toLang: toLang,   
             });
             
           } catch (error) {
             console.error('Error loading vocabulary', error);
           }
         });
         
         // Preloader
         window.addEventListener("load", () => {
          const loader = document.getElementById("preloader");
          const conteudo = document.getElementById("content");

          loader.classList.add("fade-out");
          setTimeout(() => {
          loader.style.display = "none";
          conteudo.classList.remove("hidden");
          }, 900); // Fade
          });
      </script>
