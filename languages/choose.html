<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Learn Languages for Free!" />

    <title>YooLingo</title>

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="../styles/tailwind.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" /> 
    <script src="https://unpkg.com/lucide@latest"></script>

  </head>
  <body class="font-plus-jakarta-sans">
   
      <!-- Languages -->
      <section
        class="w-full max-w-6xl bg-white overflow-hidden flex flex-col md:flex-row h-full"
      >
        <div class="w-full md:w-2/3 p-10 md:p-16 flex flex-col">
          <span
            class="text-xs font-bold text-gray-400 capitalize tracking-widest mb-3"
            >Step 2 of 6</span
          >
          <div class="flex gap-2 mb-8">
            <div class="h-1.5 w-10 bg-orange-200 rounded-full"></div>
            <div class="h-1.5 w-10 bg-orange-400 rounded-full"></div>
            <div class="h-1.5 w-10 bg-gray-100 rounded-full"></div>
            <div class="h-1.5 w-10 bg-gray-100 rounded-full"></div>
            <div class="h-1.5 w-10 bg-gray-100 rounded-full"></div>
            <div class="h-1.5 w-10 bg-gray-100 rounded-full"></div>
          </div>

          <h2
            class="text-4xl md:text-5xl font-bold text-gray-900 mb-4 leading-tight"
            data-aos="fade-left"
            data-aos-duration="1000"
          >
            Let's choose<br />a language
          </h2>

          <div
            class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 mb-auto py-10"
          >
            <!-- Spanish -->
            <a
              href="./es/"
              class="bg-gray-50 border-2 border-b-4 border-gray-100 hover:border-orange rounded-3xl p-4 h-fit md:p-6 flex flex-row md:flex-col items-center justify-start gap-6 text-center cursor-pointer hover:scale-105 transition-all duration-300"
              data-aos="fade-up"
            >
              <img
                src="../../assets/flag/es.svg"
                class="size-12 md:size-16 border-2 border-white rounded-full object-cover"
              />
              <div class="flex flex-col items-center text-center gap-1">
                <span class="text-xl font-bold text-primary">Spanish</span>
                <span class="text-[15px] font-bold text-muted"></span>
              </div>
            </a>
            
            <!-- Portuguese -->
            <a
              href="./pt-br/"
              class="bg-gray-50 border-2 border-b-4 border-gray-100 hover:border-orange rounded-3xl p-4 h-fit md:p-6 flex flex-row md:flex-col items-center justify-start gap-6 text-center cursor-pointer hover:scale-105 transition-all duration-300"
              data-aos="fade-up"
            >
              <img
                src="../../assets/flag/br.svg"
                class="size-12 md:size-16 border-2 border-white rounded-full object-cover"
              />
              <div class="flex flex-col items-center text-center gap-1">
                <span class="text-xl font-bold text-primary">Portuguese</span>
                <span class="text-[15px] font-bold text-muted">(Brazil)</span>
              </div>
            </a>

            <!-- Bahasa Indonesian -->
            <a
              href="./id/index.html"
              class="bg-gray-50 border-2 border-b-4 border-gray-100 hover:border-orange rounded-3xl p-4 h-fit md:p-6 flex flex-row md:flex-col items-center justify-start gap-6 text-center cursor-pointer hover:scale-105 transition-all duration-300"
              data-aos="fade-up"
            >
              <img
                src="../../assets/flag/id.svg"
                class="size-12 md:size-16 border-2 border-white rounded-full object-cover"
              />
              <div class="flex flex-col items-center text-center gap-1">
                <span class="text-xl font-bold text-primary">Indonesian</span>
                <span class="text-[15px] font-bold text-muted">Bahasa Indonesia</span>
              </div>
            </a>
          </div>

          <!-- Hidden ( If i Need :) ) -->
          <div class="flex items-center justify-between mt-12">
            <a
              href="../index.html"
              class="px-8 py-3 rounded-2xl border-2 border-gray-100 font-bold text-gray-500 hover:bg-gray-50 transition-all"
            >
              Back
            </a>
          </div>
        </div>

        <div
          class="hidden md:flex w-1/3 bg-orange/50 items-end justify-center relative"
        >
          <div class="relative z-10 h-full w-full">
            <img
              src="../../assets/img/freepik/girl.jpg"
              class="h-full w-full object-cover"
            />
          </div>
        </div>
      </section>
    </main>

    <!-- JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../scripts/main.js"></script>

  </body>
</html>
