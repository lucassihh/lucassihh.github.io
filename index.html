<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Learn Languages for Free!" />

    <title>YooLingo</title>
    
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="./styles/tailwind.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" /> 
    <script src="https://unpkg.com/lucide@latest"></script>
    

  </head>
  <body class="bg-background font-plus-jakarta-sans">
   
      <!-- Home -->
      <section
        class="relative w-full max-w-6xl bg-white overflow-hidden flex flex-col md:flex-row mx-auto"
      >
        <img
          src="../../assets/img/freepik/girl.jpg"
          class="absolute inset-0 h-full w-full object-cover z-10"
        />

        <div
          class="absolute inset-0 bg-gradient-to-r from-transparent via-black/20 to-black/80 z-20"
        ></div>

        <div class="hidden md:block md:w-1/2 z-30"></div>

        <div
          class="w-full h-[100vh] md:w-1/2 p-10 md:p-16 flex flex-col items-center justify-center z-40 relative"
        >
          <div class="flex justify-center md:justify-end items-center gap-2">
            <span class="font-black text-3xl text-white tracking-tighter">
              Yoo<span class="text-orange">Lingo</span>
            </span>
          </div>

          <div
            class="flex flex-col justify-center items-center text-center md:text-left gap-2 mt-20"
          >
            <h1
              class="text-5xl md:text-7xl font-black text-white leading-[0.9] tracking-tighter"
              data-aos="fade-left"
            >
              Talk to
            </h1>

            <div class="flex items-center gap-6">
              <h1
                class="text-5xl md:text-7xl font-black text-orange-400 leading-[0.9] tracking-tighter"
                data-aos="fade-left"
                data-aos-delay="100"
              >
                World
              </h1>

              <a
                href="./languages/choose.html"
                class="flex items-center justify-center size-16 md:size-20 g-orange hover:bg-orange-500 text-white rounded-full transition-all shadow-xl hover:scale-110 active:scale-95 group"
                data-aos="zoom-in"
                data-aos-delay="300"
              >
                <i
                  data-lucide="arrow-right"
                  class="size-10 group-hover:translate-x-1 transition-transform"
                ></i>
              </a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="./scripts/main.js"></script>

  </body>
</html>
